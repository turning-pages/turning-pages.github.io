# Site
name: "Turning Pages"
title: "Turning Pages"
description: "A humble place to discuss books and turn some pages ... ... ..."

logo: "assets/images/turning-pages.png"
# Small file for browser tabs; navbar uses `logo` above.
favicon: "assets/images/favicon.png"

url: "https://turning-pages.github.io"
baseurl: ""

include: ["_pages"]

# Authors (Mediumish expects `author` in post front matter to match a key here)
authors:
  bookworm:
    name: "Regular Bookworm"
    display_name: "✍️ Regular Bookworm ✍️"
    avatar: "assets/images/avatar.png"
    gravatar: b1cc14991db7a456fcd761680bbc8f81
    email: ""
    web: "https://www.ifelseandetc.xyz"
    twitter: ""
    description: "Reader, reviewer, occasional ranter about books."

# Plugins (GitHub Pages–compatible only; do not add jekyll-archives)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Pagination
paginate: 6
paginate_path: "/page:num/"

markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Theme options
lazyimages: "disabled"

# Leave blank to disable Disqus / count script
disqus: ""

exclude:
  - LICENSE.txt
  - Gemfile
  - Gemfile.lock

excerpt_separator: "<!--more-->"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      author: bookworm
      tags: ["Other"]
      comments: true
  - scope:
      path: ""
      type: "pages"
    values:
      comments: false

titles_from_headings:
  strip_title: true
  collections: true
